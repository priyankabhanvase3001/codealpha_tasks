<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>

  <!-- Google Fonts: Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ░░ Background canvas for ambient gradient ░░ -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
  </div>

  <main class="app">

    <!-- ══════════════════════════════
         CALCULATOR CARD
    ══════════════════════════════ -->
    <section class="calc-card" role="application" aria-label="Calculator">

      <!-- ── Top bar: history toggle + theme toggle ── -->
      <header class="calc-topbar">
        <button class="icon-btn" id="historyToggle" aria-label="Toggle history" title="History (H)">
          <!-- clock icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>

        <span class="calc-brand">calc<span class="brand-dot">.</span></span>

        <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme (T)">
          <!-- sun/moon icon (swapped via JS) -->
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
          </svg>
        </button>
      </header>

      <!-- ── Display ── -->
      <div class="calc-display" id="calcDisplay" aria-live="polite" aria-label="Calculator display">
        <div class="display-expression" id="displayExpression" aria-hidden="true"></div>
        <div class="display-value" id="displayValue">0</div>
      </div>

      <!-- ── Button Grid ── -->
      <div class="calc-grid" role="group" aria-label="Calculator buttons">

        <!-- Row 1: C  ±  %  ÷ -->
        <button class="btn btn--fn"  data-action="clear"    aria-label="Clear">C</button>
        <button class="btn btn--fn"  data-action="sign"     aria-label="Toggle sign">±</button>
        <button class="btn btn--fn"  data-action="percent"  aria-label="Percent">%</button>
        <button class="btn btn--op" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <!-- Row 2: 7  8  9  × -->
        <button class="btn btn--num" data-action="digit" data-value="7" aria-label="7">7</button>
        <button class="btn btn--num" data-action="digit" data-value="8" aria-label="8">8</button>
        <button class="btn btn--num" data-action="digit" data-value="9" aria-label="9">9</button>
        <button class="btn btn--op" data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <!-- Row 3: 4  5  6  − -->
        <button class="btn btn--num" data-action="digit" data-value="4" aria-label="4">4</button>
        <button class="btn btn--num" data-action="digit" data-value="5" aria-label="5">5</button>
        <button class="btn btn--num" data-action="digit" data-value="6" aria-label="6">6</button>
        <button class="btn btn--op" data-action="operator" data-value="−" aria-label="Subtract">−</button>

        <!-- Row 4: 1  2  3  + -->
        <button class="btn btn--num" data-action="digit" data-value="1" aria-label="1">1</button>
        <button class="btn btn--num" data-action="digit" data-value="2" aria-label="2">2</button>
        <button class="btn btn--num" data-action="digit" data-value="3" aria-label="3">3</button>
        <button class="btn btn--op" data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5: 0(wide)  .  = -->
        <button class="btn btn--num btn--wide" data-action="digit" data-value="0" aria-label="0">0</button>
        <button class="btn btn--num" data-action="decimal" aria-label="Decimal point">.</button>
        <button class="btn btn--eq"  data-action="equals"  aria-label="Equals">=</button>

      </div>

      <!-- ── Backspace hint ── -->
      <div class="calc-hint" aria-hidden="true">
        <kbd>⌫</kbd> backspace &nbsp;·&nbsp; <kbd>Esc</kbd> clear &nbsp;·&nbsp; <kbd>Enter</kbd> equals
      </div>
    </section>

    <!-- ══════════════════════════════
         HISTORY PANEL
    ══════════════════════════════ -->
    <aside class="history-panel" id="historyPanel" aria-label="Calculation history" aria-hidden="true">
      <div class="history-header">
        <h2 class="history-title">History</h2>
        <button class="icon-btn" id="clearHistory" aria-label="Clear all history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
      <ul class="history-list" id="historyList" aria-label="Previous calculations">
        <li class="history-empty" id="historyEmpty">No calculations yet</li>
      </ul>
    </aside>

  </main>

  <script src="script.js"></script>
</body>
</html>
